<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helperviewer - Interview History</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/frontend/favicon-32.png">
    <link rel="icon" type="image/png" sizes="64x64" href="/frontend/favicon-64.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=12">
    <link rel="stylesheet" href="css/history.css?v=4">
</head>
<body>
    <div class="app-shell">
        <main class="dashboard">
            <header class="topbar">
                <h1>Helperviewer <span>- Interview History</span></h1>
                <a href="/" class="btn btn-secondary" style="font-size:12px;padding:6px 14px;text-decoration:none;">Back to Interview</a>
            </header>

            <div class="panel filter-bar">
                <input type="text" id="candidate-filter" placeholder="Filter by candidate name..." autocomplete="off">
                <button id="btn-search" class="btn btn-primary" type="button">Search</button>
                <button id="btn-clear" class="btn btn-secondary" type="button">Clear</button>
            </div>

            <div class="panel">
                <div class="panel-title">Interview Sessions</div>
                <table id="sessions-table">
                    <thead>
                        <tr>
                            <th>Date &amp; Time</th>
                            <th>Candidate</th>
                            <th>Duration</th>
                            <th>Chunks</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sessions-tbody">
                        <tr class="skeleton-row"><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel skel-sm"></div></td><td><div class="skel skel-sm"></div></td><td><div class="skel skel-sm"></div></td><td></td></tr>
                        <tr class="skeleton-row"><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel skel-sm"></div></td><td><div class="skel skel-sm"></div></td><td><div class="skel skel-sm"></div></td><td></td></tr>
                        <tr class="skeleton-row"><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel skel-sm"></div></td><td><div class="skel skel-sm"></div></td><td><div class="skel skel-sm"></div></td><td></td></tr>
                        <tr class="skeleton-row"><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel skel-sm"></div></td><td><div class="skel skel-sm"></div></td><td><div class="skel skel-sm"></div></td><td></td></tr>
                        <tr class="skeleton-row"><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel skel-sm"></div></td><td><div class="skel skel-sm"></div></td><td><div class="skel skel-sm"></div></td><td></td></tr>
                    </tbody>
                </table>
                <div class="pagination-controls" id="pagination-controls"></div>
            </div>

            <div id="session-detail" class="panel hidden">
                <div class="panel-title">
                    <span id="detail-title">Session Detail</span>
                    <div class="detail-actions">
                        <button id="btn-view-conclusion-detail" class="btn btn-conclusion" type="button">View Conclusion</button>
                        <button id="btn-rename-detail" class="btn btn-secondary btn-detail-action" type="button">Rename</button>
                        <button id="btn-close-detail" title="Close">&times;</button>
                    </div>
                </div>
                <div id="chunks-container"></div>
            </div>
        </main>
    </div>

    <div id="conclusion-modal" class="conclusion-modal hidden" aria-hidden="true">
        <div class="conclusion-backdrop" id="conclusion-backdrop"></div>
        <div class="conclusion-dialog" role="dialog" aria-modal="true" aria-labelledby="conclusion-title">
            <header class="conclusion-header">
                <div>
                    <p class="conclusion-kicker">Session Report</p>
                    <h2 id="conclusion-title">Interview Conclusion</h2>
                </div>
                <button id="conclusion-close-btn" class="conclusion-close-btn" type="button" aria-label="Close">&times;</button>
            </header>
            <div id="conclusion-body" class="conclusion-body">
                <div class="conclusion-loading">Loading session conclusion...</div>
            </div>
            <footer class="conclusion-footer">
                <button id="conclusion-dismiss-btn" class="btn btn-primary" type="button">Close</button>
            </footer>
        </div>
    </div>

    <script src="js/conclusion-ui.js?v=1"></script>
    <script src="js/history.js?v=3"></script>
</body>
</html>
