services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: Helperviewer_backend
    ports:
      - "5555:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/Helperviewer_db
      REDIS_URL: redis://redis:6379/0
      EVENTLET_NO_GREENDNS: "yes"
      FLASK_ENV: development
      # Dataset from Google Drive: ZIP file (full dataset) – file ID from share link
      DRIVE_DATASET_ZIP_ID: "1YLvn6CrpVG0fMl5DTojHzeObvCqsfKFw"
      # Force re-download and replace dataset (set to "1" only when you want to refresh, then run: docker-compose up -d --force-recreate)
      REFRESH_DATASET: "0"
      # DRIVE_DATASET_FOLDER_ID: "150y55fRgvh8N6t8zy5potewjfEn4XHFS"  # fallback if not using ZIP
      # Vocal Tone: pre-trained model ZIP on Google Drive (vocal_tone_model.zip)
      DRIVE_VOCAL_TONE_MODEL_ZIP_ID: "1YbhpOas40kKZNHaPigMbP9WiWLbwvMdS"
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      # Dataset: filled by entrypoint from Google Drive on first run; persisted across restarts
      - dataset_data:/data/dataset
      # Persist Whisper model cache between container restarts
      - whisper_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
  postgres:
    image: postgres:15-alpine
    container_name: Helperviewer_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Helperviewer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: Helperviewer_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  whisper_cache:
  dataset_data:
